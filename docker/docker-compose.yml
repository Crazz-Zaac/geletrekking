version: "3.9"
services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: geletrekking-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - geletrekking-network

  # Backend - Node.js/Express
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: geletrekking-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: "mongodb://mongo:27017/geleTrekking"
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here_change_this}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@gele.com}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-admin123}
      FRONTEND_URL: "http://localhost:3000"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"   # ← THIS WAS MISSING
      NODE_ENV: production
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - geletrekking-network

  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: geletrekking-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - geletrekking-network

  # Mongo Express - Database Admin UI
  mongo-express:
    image: mongo-express:latest
    container_name: geletrekking-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-sherap}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASS:-sherap123}
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - geletrekking-network

volumes:
  mongo_data:
    driver: local

networks:
  geletrekking-network:
    driver: bridge