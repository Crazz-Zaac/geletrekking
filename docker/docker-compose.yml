version: "3.9"

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: geletrekking-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    volumes:
      - ../frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev
    restart: unless-stopped
    networks:
      - geletrekking-network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: geletrekking-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/geleTrekking
      - PORT=5000
    volumes:
      - ../backend:/usr/src/app
      
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - geletrekking-network

  mongo:
    image: mongo:latest
    container_name: geletrekking-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - geletrekking-network

  mongo-express:
    image: mongo-express:latest
    container_name: geletrekking-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=sherap
      - ME_CONFIG_BASICAUTH_PASSWORD=sherap123
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - geletrekking-network

volumes:
  mongo_data:

networks:
  geletrekking-network:
    driver: bridge
