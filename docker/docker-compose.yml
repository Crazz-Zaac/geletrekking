version: "3.9"

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: geletrekking-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    restart: always

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: geletrekking-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/geleTrekkingDB
      - PORT=5000
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:latest
    container_name: geletrekking-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
