services:
  # Frontend - Next.js app
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: geletrekking-frontend
    expose:
      - "3000"
    env_file:
      - ../frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped  # TODO: Change to 'on-failure' in production
    networks:
      - geletrekking-network

  # Nginx reverse proxy - TLS termination (HTTPS)
  nginx:
    image: nginx:1.27-alpine
    container_name: geletrekking-nginx
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    restart: unless-stopped
    networks:
      - geletrekking-network

  # Certbot (run manually via scripts for production SSL issuance/renewal)
  certbot:
    image: certbot/certbot:latest
    container_name: geletrekking-certbot
    profiles:
      - prod
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ./ssl:/etc/nginx/certs
    networks:
      - geletrekking-network

  # Backend - Node.js/Express
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: geletrekking-backend
    env_file:
      - ../backend/.env
    volumes:
      - ./ssl:/etc/nginx/certs:ro
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    networks:
      - geletrekking-network

  # Redis - Risk profile and anti-abuse state store
  redis:
    image: redis:7-alpine
    container_name: geletrekking-redis
    restart: unless-stopped
    networks:
      - geletrekking-network

  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: geletrekking-mongo
    env_file:
      - ../backend/.env
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - geletrekking-network

  # Mongo Express - Database Admin UI
  mongo-express:
    image: mongo-express:latest
    container_name: geletrekking-mongo-express
    env_file:
      - ../backend/.env
    depends_on:
      - mongo
    restart: unless-stopped  # TODO: Change to 'on-failure' in production
    networks:
      - geletrekking-network

volumes:
  mongo_data:
    driver: local
  letsencrypt:
    driver: local
  certbot_www:
    driver: local

networks:
  geletrekking-network:
    driver: bridge